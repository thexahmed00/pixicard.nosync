#outlet\agent\account Related APIs
extend type Mutation {
    updateProfile(
        input: UpdateProfileInput! @spread
    ): UpdateProfileResult @guard(with: ["pos_user"]) @field(resolver: "Webkul\\Pos\\Mutations\\Outlet\\Agent\\AccountMutation@update")
}

input UpdateProfileInput {
    firstName: String! @rules(apply: ["required"]) @rename(attribute: "firstname")
    lastName: String! @rules(apply: ["required"]) @rename(attribute: "lastname")
    email: String! @rules(apply: ["email"])
    oldPassword: String @rename(attribute: "old_password")
    newPassword: String @rename(attribute: "new_password")
    newPasswordConfirmation: String @rename(attribute: "new_password_confirmation")
    lowStockQty: Int @rename(attribute: "low_stock_qty")
    uploadType: UploadType @rename(attribute: "upload_type")
    imageUrl: String @rename(attribute: "image_url")
    image: Upload
}

type UpdateProfileResult {
    success: Boolean
    errors: String
    message: String
    agent: Agent
}
