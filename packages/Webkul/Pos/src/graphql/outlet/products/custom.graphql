#outlet/products/custom.graphql

extend type Mutation {
    createOutletProduct(
        input: createOutletProductInput! @spread
    ): createOutletProductResult @guard(with: ["pos_user"]) @field(resolver: "Webkul\\Pos\\Mutations\\Outlet\\ProductMutation@createProduct")
}

input createOutletProductInput {
    name: String!
    sku: String!
    price: Float!
    quantity: Int!
    weight: Float!
}

type createOutletProductResult {
    success: Boolean!
    errors: String
    message: String
    product: OutletProductResult
}